<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Otome Prompt Builder</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;500;700&family=Cormorant+Garamond:wght@400;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg-primary: #0f0f14;
  --bg-secondary: #1a1a24;
  --bg-card: #22222e;
  --bg-card-hover: #2a2a38;
  --text-primary: #e8e4ef;
  --text-secondary: #9a95a8;
  --text-muted: #6b6578;
  --accent-cyan: #7ec8d4;
  --accent-pink: #d4a0b9;
  --accent-gray: #8a8a9e;
  --accent-cyan-dim: rgba(126,200,212,0.15);
  --accent-pink-dim: rgba(212,160,185,0.15);
  --accent-gray-dim: rgba(138,138,158,0.15);
  --border: rgba(255,255,255,0.06);
  --border-active: rgba(126,200,212,0.4);
  --radius: 12px;
  --radius-sm: 8px;
  --radius-tag: 20px;
  --shadow: 0 2px 12px rgba(0,0,0,0.3);
  --font-body: 'Zen Kaku Gothic New', sans-serif;
  --font-display: 'Cormorant Garamond', serif;
}

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; }

body {
  font-family: var(--font-body);
  background: var(--bg-primary);
  color: var(--text-primary);
  min-height: 100vh;
  padding-bottom: 220px;
  overflow-x: hidden;
}

/* ===== HEADER ===== */
.header {
  padding: 20px 16px 12px;
  text-align: center;
  position: relative;
  background: linear-gradient(180deg, rgba(126,200,212,0.08) 0%, transparent 100%);
}
.header h1 {
  font-family: var(--font-display);
  font-size: 26px;
  font-weight: 400;
  letter-spacing: 4px;
  color: var(--accent-cyan);
  text-transform: uppercase;
}
.header .sub {
  font-size: 11px;
  color: var(--text-muted);
  letter-spacing: 2px;
  margin-top: 4px;
}

/* ===== LANG TOGGLE ===== */
.lang-toggle {
  position: fixed;
  top: 12px;
  right: 12px;
  z-index: 100;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 6px 12px;
  font-size: 12px;
  color: var(--accent-cyan);
  cursor: pointer;
  backdrop-filter: blur(10px);
}

/* ===== MODE SELECTOR ===== */
.mode-selector {
  display: flex;
  gap: 8px;
  padding: 12px 16px;
  justify-content: center;
}
.mode-btn {
  flex: 1;
  max-width: 140px;
  padding: 12px 8px;
  border-radius: var(--radius);
  border: 1px solid var(--border);
  background: var(--bg-card);
  color: var(--text-secondary);
  font-family: var(--font-body);
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.3s;
  text-align: center;
}
.mode-btn.active {
  border-color: var(--accent-cyan);
  background: var(--accent-cyan-dim);
  color: var(--accent-cyan);
  box-shadow: 0 0 20px rgba(126,200,212,0.1);
}
.mode-btn .icon { font-size: 20px; display: block; margin-bottom: 4px; }

/* ===== CATEGORY SECTIONS ===== */
.category {
  margin: 8px 12px;
  border-radius: var(--radius);
  background: var(--bg-secondary);
  border: 1px solid var(--border);
  overflow: hidden;
  transition: all 0.3s;
}
.category.hidden { display: none; }
.cat-header {
  padding: 14px 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  cursor: pointer;
  user-select: none;
}
.cat-header h2 {
  font-size: 14px;
  font-weight: 500;
  display: flex;
  align-items: center;
  gap: 8px;
}
.cat-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  display: inline-block;
}
.cat-dot.cyan { background: var(--accent-cyan); }
.cat-dot.pink { background: var(--accent-pink); }
.cat-dot.gray { background: var(--accent-gray); }
.cat-arrow {
  font-size: 12px;
  color: var(--text-muted);
  transition: transform 0.3s;
}
.cat-header.open .cat-arrow { transform: rotate(180deg); }
.cat-count {
  font-size: 11px;
  color: var(--accent-cyan);
  margin-right: 8px;
  min-width: 20px;
  text-align: right;
}
.cat-body {
  padding: 0 12px 14px;
  display: none;
}
.cat-body.open { display: block; }

/* ===== SUBCATEGORY ===== */
.subcat-label {
  font-size: 11px;
  color: var(--text-muted);
  margin: 10px 0 6px;
  letter-spacing: 1px;
}

/* ===== TAGS ===== */
.tags { display: flex; flex-wrap: wrap; gap: 6px; }
.tag {
  padding: 7px 14px;
  border-radius: var(--radius-tag);
  border: 1px solid var(--border);
  background: var(--bg-card);
  color: var(--text-secondary);
  font-size: 12px;
  cursor: pointer;
  transition: all 0.25s;
  user-select: none;
  white-space: nowrap;
}
.tag:active { transform: scale(0.95); }
.tag.selected {
  border-color: var(--accent-cyan);
  background: var(--accent-cyan-dim);
  color: var(--accent-cyan);
}
.tag.selected.pink-tag {
  border-color: var(--accent-pink);
  background: var(--accent-pink-dim);
  color: var(--accent-pink);
}

/* ===== PRESET SECTION ===== */
.preset-area {
  padding: 0 12px 14px;
}
.preset-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 12px;
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  cursor: pointer;
  transition: all 0.25s;
}
.preset-card.selected {
  border-color: var(--accent-pink);
  background: var(--accent-pink-dim);
}
.preset-info { flex:1; }
.preset-name { font-size: 13px; font-weight: 500; color: var(--text-primary); }
.preset-detail { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
.preset-actions { display: flex; gap: 8px; }
.preset-actions button {
  background: none;
  border: none;
  color: var(--text-muted);
  font-size: 16px;
  cursor: pointer;
  padding: 4px;
}
.add-preset-btn {
  width: 100%;
  padding: 12px;
  border-radius: var(--radius-sm);
  border: 1px dashed var(--border);
  background: transparent;
  color: var(--text-muted);
  font-family: var(--font-body);
  font-size: 13px;
  cursor: pointer;
  transition: all 0.25s;
}
.add-preset-btn:hover { border-color: var(--accent-cyan); color: var(--accent-cyan); }

/* ===== MODAL ===== */
.modal-overlay {
  position: fixed;
  top:0; left:0; right:0; bottom:0;
  background: rgba(0,0,0,0.7);
  z-index: 200;
  display: none;
  align-items: center;
  justify-content: center;
  padding: 20px;
}
.modal-overlay.show { display: flex; }
.modal {
  background: var(--bg-secondary);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 24px;
  width: 100%;
  max-width: 360px;
}
.modal h3 {
  font-size: 16px;
  margin-bottom: 16px;
  color: var(--accent-cyan);
}
.modal label {
  font-size: 12px;
  color: var(--text-secondary);
  display: block;
  margin-bottom: 4px;
  margin-top: 12px;
}
.modal input, .modal select {
  width: 100%;
  padding: 10px 12px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  background: var(--bg-card);
  color: var(--text-primary);
  font-family: var(--font-body);
  font-size: 14px;
  outline: none;
}
.modal input:focus, .modal select:focus { border-color: var(--accent-cyan); }
.modal-btns {
  display: flex;
  gap: 8px;
  margin-top: 20px;
}
.modal-btns button {
  flex: 1;
  padding: 10px;
  border-radius: var(--radius-sm);
  border: none;
  font-family: var(--font-body);
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
}
.btn-cancel { background: var(--bg-card); color: var(--text-secondary); }
.btn-save { background: var(--accent-cyan); color: var(--bg-primary); }
.btn-delete { background: #d44; color: #fff; }

/* ===== FREE TEXT ===== */
.free-text-area {
  margin: 8px 12px;
}
.free-text-area textarea {
  width: 100%;
  min-height: 80px;
  padding: 12px;
  border-radius: var(--radius);
  border: 1px solid var(--border);
  background: var(--bg-secondary);
  color: var(--text-primary);
  font-family: var(--font-body);
  font-size: 13px;
  resize: vertical;
  outline: none;
}
.free-text-area textarea:focus { border-color: var(--accent-cyan); }
.free-text-area label {
  font-size: 12px;
  color: var(--text-muted);
  margin-bottom: 6px;
  display: block;
}

/* ===== PROMPT OUTPUT ===== */
.prompt-output {
  position: fixed;
  bottom: 0;
  left: 0; right: 0;
  background: var(--bg-secondary);
  border-top: 1px solid var(--border);
  padding: 12px 12px calc(12px + env(safe-area-inset-bottom));
  z-index: 50;
  backdrop-filter: blur(20px);
  background: rgba(26,26,36,0.95);
}
.prompt-box {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 10px 12px;
  min-height: 60px;
  max-height: 100px;
  overflow-y: auto;
  font-size: 12px;
  color: var(--text-secondary);
  line-height: 1.6;
  word-break: break-all;
  margin-bottom: 8px;
}
.prompt-box:empty::before {
  content: 'タグを選択するとここにプロンプトが表示されます...';
  color: var(--text-muted);
}
.prompt-actions {
  display: flex;
  gap: 8px;
}
.copy-btn {
  flex: 1;
  padding: 12px;
  border-radius: var(--radius-sm);
  border: none;
  font-family: var(--font-body);
  font-size: 14px;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.3s;
  background: linear-gradient(135deg, var(--accent-cyan), var(--accent-pink));
  color: var(--bg-primary);
  letter-spacing: 1px;
}
.copy-btn:active { transform: scale(0.97); opacity: 0.8; }
.copy-btn.copied {
  background: linear-gradient(135deg, #5ab88a, #7ec8d4);
}
.clear-btn {
  padding: 12px 16px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  background: var(--bg-card);
  color: var(--text-muted);
  font-family: var(--font-body);
  font-size: 13px;
  cursor: pointer;
}

/* ===== TOAST ===== */
.toast {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%) scale(0.8);
  background: rgba(126,200,212,0.95);
  color: var(--bg-primary);
  padding: 16px 32px;
  border-radius: var(--radius);
  font-size: 15px;
  font-weight: 700;
  opacity: 0;
  pointer-events: none;
  transition: all 0.3s;
  z-index: 300;
  letter-spacing: 1px;
}
.toast.show {
  opacity: 1;
  transform: translate(-50%, -50%) scale(1);
}

/* ===== SCROLLBAR ===== */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
</style>
</head>

  <div class="prompt-actions">

</div>

// ===== RENDER =====
function renderCategories() {
  const container = document.getElementById('categories');
  container.innerHTML = '';

  // Body Type Presets section
  const presetHtml = `
    <div class="category" id="cat-bodytype">
      <div class="cat-header" onclick="toggleCat('bodytype')">
        <h2><span class="cat-dot pink"></span>体型プリセット</h2>
        <div style="display:flex;align-items:center;">
          <span class="cat-count" id="count-bodytype">0</span>
          <span class="cat-arrow">▼</span>
        </div>
      </div>
      <div class="cat-body" id="body-bodytype">
        <div class="preset-area" id="presetList"></div>
        <button class="add-preset-btn" onclick="openAddPreset()">＋ 新しいプリセットを追加</button>
      </div>
    </div>
  `;
  container.insertAdjacentHTML('beforeend', presetHtml);

  // Other categories
  CATEGORIES.forEach(cat => {
    const html = `
      <div class="category ${cat.modes.includes(currentMode) ? '' : 'hidden'}" id="cat-${cat.id}" data-modes="${cat.modes.join(',')}">
        <div class="cat-header" onclick="toggleCat('${cat.id}')">
          <h2><span class="cat-dot ${cat.dot}"></span><span class="cat-title-text" data-jp="${cat.title}" data-en="${cat.titleEn}">${currentLang === 'jp' ? cat.title : cat.titleEn}</span></h2>
          <div style="display:flex;align-items:center;">
            <span class="cat-count" id="count-${cat.id}">0</span>
            <span class="cat-arrow">▼</span>
          </div>
        </div>
        <div class="cat-body" id="body-${cat.id}">
          ${cat.subcats.map(sc => `
            ${sc.label ? `<div class="subcat-label">${currentLang === 'jp' ? sc.label : (sc.labelEn || sc.label)}</div>` : ''}
            <div class="tags">
              ${sc.items.map(item => `
                <div class="tag ${cat.dot === 'pink' ? 'pink-sel' : ''}" 
                     data-en="${item.en}" 
                     data-jp="${item.jp}"
                     onclick="toggleTag(this)">
                  ${currentLang === 'jp' ? item.jp : item.en}
                </div>
              `).join('')}
            </div>
          `).join('')}
        </div>
      </div>
    `;
    container.insertAdjacentHTML('beforeend', html);
  });

  renderPresets();
  updateCounts();
}

function renderPresets() {
  const list = document.getElementById('presetList');
  if (!list) return;

  const relevantPresets = presets.filter(p => {
    if (currentMode === 'male') return p.gender === 'male';
    if (currentMode === 'female') return p.gender === 'female';
    return true;
  });

  list.innerHTML = relevantPresets.length === 0
    ? '<div style="color:var(--text-muted);font-size:12px;padding:8px;text-align:center;">プリセットがありません</div>'
    : relevantPresets.map(p => {
      const genderLabel = p.gender === 'male' ? '♂' : '♀';
      const isSelected = selectedPresets[p.gender] === p.id;
      return `
        <div class="preset-card ${isSelected ? 'selected' : ''}" onclick="selectPreset('${p.id}')">
          <div class="preset-info">
            <div class="preset-name">${genderLabel} ${p.name}</div>
            <div class="preset-detail">${p.height}cm / ${p.weight}kg / ${p.bodyType}</div>
          </div>
          <div class="preset-actions">
            <button onclick="event.stopPropagation();openEditPreset('${p.id}')">✏️</button>
          </div>
        </div>
      `;
    }).join('');
}

// ===== INTERACTIONS =====
function setMode(mode) {
  currentMode = mode;
  document.querySelectorAll('.mode-btn').forEach(b => b.classList.toggle('active', b.dataset.mode === mode));
  document.querySelectorAll('.category[data-modes]').forEach(cat => {
    const modes = cat.dataset.modes.split(',');
    cat.classList.toggle('hidden', !modes.includes(mode));
  });
  renderPresets();
  updatePrompt();
}

function toggleCat(id) {
  const header = document.querySelector(`#cat-${id} .cat-header`);
  const body = document.getElementById(`body-${id}`);
  header.classList.toggle('open');
  body.classList.toggle('open');
}

function toggleTag(el) {
  const en = el.dataset.en;
  el.classList.toggle('selected');
  if (el.classList.contains('pink-sel') && el.classList.contains('selected')) {
    el.classList.add('pink-tag');
  } else {
    el.classList.remove('pink-tag');
  }
  if (el.classList.contains('selected')) {
    selectedTags.add(en);
  } else {
    selectedTags.delete(en);
  }
  updateCounts();
  updatePrompt();
}

function toggleLang() {
  currentLang = currentLang === 'jp' ? 'en' : 'jp';
  // Update category titles
  document.querySelectorAll('.cat-title-text').forEach(el => {
    el.textContent = currentLang === 'jp' ? el.dataset.jp : el.dataset.en;
  });
  // Update tags
  document.querySelectorAll('.tag').forEach(el => {
    el.textContent = currentLang === 'jp' ? el.dataset.jp : el.dataset.en;
  });
  // Update subcat labels
  // (Simplified: re-render)
  const langBtn = document.querySelector('.lang-toggle');
  langBtn.textContent = currentLang === 'jp' ? 'EN/JP' : 'JP/EN';
}

// ===== PRESETS =====
function openAddPreset() {
  editingPresetId = null;
  document.getElementById('modalTitle').textContent = 'プリセット追加';
  document.getElementById('presetName').value = '';
  document.getElementById('presetGender').value = currentMode === 'female' ? 'female' : 'male';
  document.getElementById('presetHeight').value = '';
  document.getElementById('presetWeight').value = '';
  document.getElementById('presetBodyType').value = 'しっかりとした身体つき';
  document.getElementById('deletePresetBtn').style.display = 'none';
  document.getElementById('presetModal').classList.add('show');
}

function openEditPreset(id) {
  const p = presets.find(x => x.id === id);
  if (!p) return;
  editingPresetId = id;
  document.getElementById('modalTitle').textContent = 'プリセット編集';
  document.getElementById('presetName').value = p.name;
  document.getElementById('presetGender').value = p.gender;
  document.getElementById('presetHeight').value = p.height;
  document.getElementById('presetWeight').value = p.weight;
  document.getElementById('presetBodyType').value = p.bodyType;
  document.getElementById('deletePresetBtn').style.display = 'block';
  document.getElementById('presetModal').classList.add('show');
}

function closeModal() {
  document.getElementById('presetModal').classList.remove('show');
}

function savePreset() {
  const name = document.getElementById('presetName').value.trim();
  const gender = document.getElementById('presetGender').value;
  const height = document.getElementById('presetHeight').value;
  const weight = document.getElementById('presetWeight').value;
  const bodyType = document.getElementById('presetBodyType').value;
  if (!name || !height) { showToast('名前と身長を入力してね'); return; }

  if (editingPresetId) {
    const idx = presets.findIndex(x => x.id === editingPresetId);
    if (idx >= 0) presets[idx] = { ...presets[idx], name, gender, height, weight, bodyType };
  } else {
    presets.push({ id: 'p' + Date.now(), name, gender, height, weight, bodyType });
  }
  localStorage.setItem('otomePresets', JSON.stringify(presets));
  closeModal();
  renderPresets();
  updatePrompt();
  showToast('保存しました ✨');
}

function deletePreset() {
  if (!editingPresetId) return;
  presets = presets.filter(x => x.id !== editingPresetId);
  if (selectedPresets.male === editingPresetId) selectedPresets.male = null;
  if (selectedPresets.female === editingPresetId) selectedPresets.female = null;
  localStorage.setItem('otomePresets', JSON.stringify(presets));
  closeModal();
  renderPresets();
  updatePrompt();
  showToast('削除しました');
}

function selectPreset(id) {
  const p = presets.find(x => x.id === id);
  if (!p) return;
  if (selectedPresets[p.gender] === id) {
    selectedPresets[p.gender] = null;
  } else {
    selectedPresets[p.gender] = id;
  }
  renderPresets();
  updateCounts();
  updatePrompt();
}

// ===== PROMPT BUILDING =====
function updatePrompt() {
  const parts = [];

  // Tags (English)
  if (selectedTags.size > 0) {
    parts.push([...selectedTags].join(', '));
  }

  // Person count
  if (currentMode === 'male') parts.unshift('1boy');
  else if (currentMode === 'female') parts.unshift('1girl');
  else if (currentMode === 'couple') parts.unshift('1boy, 1girl');

  // Body type presets (Japanese)
  const bodyParts = [];
  if (currentMode === 'male' || currentMode === 'couple') {
    const mp = presets.find(x => x.id === selectedPresets.male);
    if (mp) bodyParts.push(`男性、${mp.height}センチ、${mp.weight ? mp.weight + 'キロ、' : ''}${mp.bodyType}`);
  }
  if (currentMode === 'female' || currentMode === 'couple') {
    const fp = presets.find(x => x.id === selectedPresets.female);
    if (fp) bodyParts.push(`女性、${fp.height}センチ、${fp.weight ? fp.weight + 'キロ、' : ''}${fp.bodyType}`);
  }
  if (bodyParts.length > 0) parts.push(bodyParts.join('。') + '。');

  // Free text
  const freeText = document.getElementById('freeText').value.trim();
  if (freeText) parts.push(freeText);

  const prompt = parts.join(', ');
  document.getElementById('promptBox').textContent = prompt;
}

function updateCounts() {
  CATEGORIES.forEach(cat => {
    const countEl = document.getElementById(`count-${cat.id}`);
    if (!countEl) return;
    let count = 0;
    cat.subcats.forEach(sc => {
      sc.items.forEach(item => {
        if (selectedTags.has(item.en)) count++;
      });
    });
    countEl.textContent = count > 0 ? count : '';
  });

  // Preset count
  const presetCount = document.getElementById('count-bodytype');
  if (presetCount) {
    let c = 0;
    if (selectedPresets.male) c++;
    if (selectedPresets.female) c++;
    presetCount.textContent = c > 0 ? c : '';
  }
}

function copyPrompt() {
  const text = document.getElementById('promptBox').textContent;
  if (!text) { showToast('プロンプトがないよ！'); return; }
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.getElementById('copyBtn');
    btn.classList.add('copied');
    btn.textContent = '✅ コピーしました！';
    showToast('コピー完了！🎉');
    setTimeout(() => {
      btn.classList.remove('copied');
      btn.textContent = '📋 コピー';
    }, 2000);
  }).catch(() => {
    // Fallback
    const ta = document.createElement('textarea');
    ta.value = text;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    showToast('コピー完了！🎉');
  });
}

function clearAll() {
  selectedTags.clear();
  selectedPresets = { male: null, female: null };
  document.querySelectorAll('.tag.selected').forEach(t => {
    t.classList.remove('selected', 'pink-tag');
  });
  document.getElementById('freeText').value = '';
  renderPresets();
  updateCounts();
  updatePrompt();
  showToast('全消去しました');
}

function showToast(msg) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 1500);
}

// ===== INIT =====
renderCategories();
updatePrompt();
</script>
