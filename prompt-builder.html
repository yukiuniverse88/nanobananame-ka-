<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Otome Prompt Builder</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;500;700&family=Cormorant+Garamond:wght@400;600&display=swap" rel="stylesheet">
<style>
:root{--bg-primary:#0f0f14;--bg-secondary:#1a1a24;--bg-card:#22222e;--text-primary:#e8e4ef;--text-secondary:#9a95a8;--text-muted:#6b6578;--accent-cyan:#7ec8d4;--accent-pink:#d4a0b9;--accent-gray:#8a8a9e;--accent-cyan-dim:rgba(126,200,212,0.15);--accent-pink-dim:rgba(212,160,185,0.15);--accent-gray-dim:rgba(138,138,158,0.15);--border:rgba(255,255,255,0.06);--radius:12px;--radius-sm:8px;--radius-tag:20px;--font-body:'Zen Kaku Gothic New',sans-serif;--font-display:'Cormorant Garamond',serif}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:var(--font-body);background:var(--bg-primary);color:var(--text-primary);min-height:100vh;padding-bottom:240px;overflow-x:hidden}
.header{padding:20px 16px 12px;text-align:center;background:linear-gradient(180deg,rgba(126,200,212,0.08)0%,transparent 100%)}
.header h1{font-family:var(--font-display);font-size:26px;font-weight:400;letter-spacing:4px;color:var(--accent-cyan);text-transform:uppercase}
.header .sub{font-size:11px;color:var(--text-muted);letter-spacing:2px;margin-top:4px}
.top-bar{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;justify-content:flex-end;gap:8px;padding:10px 12px;background:rgba(15,15,20,0.85);backdrop-filter:blur(10px)}
.top-btn{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-sm);padding:6px 12px;font-size:12px;color:var(--accent-cyan);cursor:pointer;font-family:var(--font-body)}
.mode-selector{display:flex;gap:8px;padding:12px 16px;justify-content:center}
.mode-btn{flex:1;max-width:140px;padding:12px 8px;border-radius:var(--radius);border:1px solid var(--border);background:var(--bg-card);color:var(--text-secondary);font-family:var(--font-body);font-size:13px;font-weight:500;cursor:pointer;transition:all .3s;text-align:center}
.mode-btn.active{border-color:var(--accent-cyan);background:var(--accent-cyan-dim);color:var(--accent-cyan)}
.mode-btn .icon{font-size:20px;display:block;margin-bottom:4px}
.aspect-selector{display:flex;gap:8px;padding:4px 16px 12px;justify-content:center;flex-wrap:wrap}
.aspect-btn{display:flex;align-items:center;gap:6px;padding:8px 14px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--bg-card);color:var(--text-secondary);font-family:var(--font-body);font-size:12px;cursor:pointer;transition:all .3s}
.aspect-btn.active{border-color:var(--accent-pink);background:var(--accent-pink-dim);color:var(--accent-pink)}
.aspect-icon{display:inline-block;border:1.5px solid currentColor;border-radius:2px}
.aspect-icon.portrait{width:10px;height:14px}.aspect-icon.landscape{width:14px;height:10px}.aspect-icon.square{width:12px;height:12px}
.category{margin:8px 12px;border-radius:var(--radius);background:var(--bg-secondary);border:1px solid var(--border);overflow:hidden}
.category.hidden{display:none}
.cat-header{padding:14px 16px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;user-select:none}
.cat-header h2{font-size:14px;font-weight:500;display:flex;align-items:center;gap:8px}
.cat-dot{width:8px;height:8px;border-radius:50%;display:inline-block}
.cat-dot.cyan{background:var(--accent-cyan)}.cat-dot.pink{background:var(--accent-pink)}.cat-dot.gray{background:var(--accent-gray)}
.cat-right{display:flex;align-items:center;gap:4px}
.cat-arrow{font-size:12px;color:var(--text-muted);transition:transform .3s}
.cat-header.open .cat-arrow{transform:rotate(180deg)}
.cat-count{font-size:11px;color:var(--accent-cyan);min-width:20px;text-align:right}
.cat-help-btn{background:none;border:1px solid var(--border);border-radius:50%;width:24px;height:24px;color:var(--text-muted);font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s}
.cat-help-btn:hover,.cat-help-btn.active{border-color:var(--accent-cyan);color:var(--accent-cyan);background:var(--accent-cyan-dim)}
.cat-body{padding:0 12px 14px;display:none}.cat-body.open{display:block}
.subcat-label{font-size:11px;color:var(--text-muted);margin:10px 0 6px;letter-spacing:1px}
.tags{display:flex;flex-wrap:wrap;gap:6px}
.tag{padding:7px 14px;border-radius:var(--radius-tag);border:1px solid var(--border);background:var(--bg-card);color:var(--text-secondary);font-size:12px;cursor:pointer;transition:all .25s;user-select:none;white-space:nowrap}
.tag:active{transform:scale(0.95)}
.tag.selected{border-color:var(--accent-cyan);background:var(--accent-cyan-dim);color:var(--accent-cyan)}
.tag.selected.pink-tag{border-color:var(--accent-pink);background:var(--accent-pink-dim);color:var(--accent-pink)}
/* Inline help */
.inline-help{display:none;margin:8px 0;padding:10px;background:rgba(126,200,212,0.05);border:1px solid rgba(126,200,212,0.15);border-radius:var(--radius-sm)}
.inline-help.open{display:block}
.inline-help-title{font-size:11px;color:var(--accent-cyan);margin-bottom:8px;font-weight:500}
.help-tag{display:flex;align-items:flex-start;gap:8px;padding:8px;margin-bottom:4px;background:var(--bg-card);border-radius:var(--radius-sm);cursor:pointer;border:1px solid transparent;transition:all .2s}
.help-tag:active{transform:scale(0.98)}
.help-tag.selected{border-color:var(--accent-cyan);background:var(--accent-cyan-dim)}
.help-tag .ht-plus{color:var(--accent-cyan);font-size:14px;font-weight:700;min-width:16px;text-align:center;line-height:1.2}
.help-tag.selected .ht-plus{color:var(--accent-pink)}
.help-tag .ht-info{flex:1}
.help-tag .ht-en{font-size:12px;color:var(--accent-cyan);font-weight:500}
.help-tag .ht-jp{font-size:11px;color:var(--text-secondary)}
.help-tag .ht-desc{font-size:10px;color:var(--text-muted);margin-top:2px;line-height:1.4}
/* Presets */
.preset-area{padding:0 12px 14px}
.preset-card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;transition:all .25s}
.preset-card.selected{border-color:var(--accent-pink);background:var(--accent-pink-dim)}
.preset-info{flex:1}.preset-name{font-size:13px;font-weight:500}.preset-detail{font-size:11px;color:var(--text-muted);margin-top:2px}
.preset-actions button{background:none;border:none;color:var(--text-muted);font-size:16px;cursor:pointer;padding:4px}
.add-preset-btn{width:100%;padding:12px;border-radius:var(--radius-sm);border:1px dashed var(--border);background:transparent;color:var(--text-muted);font-family:var(--font-body);font-size:13px;cursor:pointer}
/* Modal */
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.7);z-index:200;display:none;align-items:center;justify-content:center;padding:20px}
.modal-overlay.show{display:flex}
.modal{background:var(--bg-secondary);border:1px solid var(--border);border-radius:var(--radius);padding:24px;width:100%;max-width:360px}
.modal h3{font-size:16px;margin-bottom:16px;color:var(--accent-cyan)}
.modal label{font-size:12px;color:var(--text-secondary);display:block;margin-bottom:4px;margin-top:12px}
.modal input,.modal select{width:100%;padding:10px 12px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--bg-card);color:var(--text-primary);font-family:var(--font-body);font-size:14px;outline:none}
.modal input:focus,.modal select:focus{border-color:var(--accent-cyan)}
.modal-btns{display:flex;gap:8px;margin-top:20px}
.modal-btns button{flex:1;padding:10px;border-radius:var(--radius-sm);border:none;font-family:var(--font-body);font-size:13px;font-weight:500;cursor:pointer}
.btn-cancel{background:var(--bg-card);color:var(--text-secondary)}.btn-save{background:var(--accent-cyan);color:var(--bg-primary)}.btn-delete{background:#d44;color:#fff}
/* Free text */
.free-text-area{margin:8px 12px}
.free-text-area textarea{width:100%;min-height:80px;padding:12px;border-radius:var(--radius);border:1px solid var(--border);background:var(--bg-secondary);color:var(--text-primary);font-family:var(--font-body);font-size:13px;resize:vertical;outline:none}
.free-text-area textarea:focus{border-color:var(--accent-cyan)}
.free-text-area label{font-size:12px;color:var(--text-muted);margin-bottom:6px;display:block}
/* Prompt output */
.prompt-output{position:fixed;bottom:0;left:0;right:0;border-top:1px solid var(--border);padding:12px 12px calc(12px + env(safe-area-inset-bottom));z-index:50;backdrop-filter:blur(20px);background:rgba(26,26,36,0.95)}
.prompt-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.prompt-header-label{font-size:11px;color:var(--text-muted)}
.prompt-lang-btn{background:var(--bg-card);border:1px solid var(--border);border-radius:4px;padding:3px 8px;font-size:10px;color:var(--accent-pink);cursor:pointer;font-family:var(--font-body)}
.prompt-lang-btn.active{background:var(--accent-pink-dim);border-color:var(--accent-pink)}
.prompt-chips{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-sm);padding:8px;min-height:60px;max-height:120px;overflow-y:auto;margin-bottom:8px;display:flex;flex-wrap:wrap;gap:4px;align-content:flex-start}
.prompt-chips:empty::before{content:'タグを選択するとプロンプトが表示されます...';color:var(--text-muted);font-size:12px;padding:4px}
.p-chip{display:inline-flex;align-items:center;gap:4px;padding:4px 8px;border-radius:12px;font-size:11px;background:var(--accent-cyan-dim);color:var(--accent-cyan);border:1px solid rgba(126,200,212,0.3);white-space:nowrap}
.p-chip.body-chip{background:var(--accent-pink-dim);color:var(--accent-pink);border-color:rgba(212,160,185,0.3)}
.p-chip.aspect-chip{background:var(--accent-gray-dim);color:var(--accent-gray);border-color:rgba(138,138,158,0.3)}
.p-chip.free-chip{background:rgba(255,255,255,0.05);color:var(--text-secondary);border-color:var(--border)}
.p-chip .chip-x{cursor:pointer;font-size:13px;opacity:0.6;margin-left:2px;line-height:1}
.p-chip .chip-x:hover{opacity:1}
/* Templates */
.template-section{margin:8px 12px}
.template-section label{font-size:12px;color:var(--text-muted);margin-bottom:6px;display:block}
.template-tags{display:flex;flex-wrap:wrap;gap:6px}
.template-tag{padding:8px 14px;border-radius:var(--radius-tag);border:1px solid rgba(212,160,185,0.3);background:rgba(212,160,185,0.08);color:var(--accent-pink);font-size:12px;cursor:pointer;transition:all .25s;user-select:none}
.template-tag:active{transform:scale(0.95)}
.template-tag.active{background:var(--accent-pink-dim);border-color:var(--accent-pink)}
/* Phrases */
.phrase-section{margin:8px 12px}
.phrase-section label{font-size:12px;color:var(--text-muted);margin-bottom:6px;display:block}
.phrase-tags{display:flex;flex-wrap:wrap;gap:6px}
.phrase-tag{padding:6px 12px;border-radius:var(--radius-tag);border:1px solid var(--border);background:var(--bg-card);color:var(--text-secondary);font-size:11px;cursor:pointer;transition:all .25s}
.prompt-actions{display:flex;gap:8px}
.copy-btn{flex:1;padding:12px;border-radius:var(--radius-sm);border:none;font-family:var(--font-body);font-size:14px;font-weight:700;cursor:pointer;background:linear-gradient(135deg,var(--accent-cyan),var(--accent-pink));color:var(--bg-primary);letter-spacing:1px}
.copy-btn:active{transform:scale(0.97);opacity:.8}
.copy-btn.copied{background:linear-gradient(135deg,#5ab88a,#7ec8d4)}
.clear-btn{padding:12px 16px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--bg-card);color:var(--text-muted);font-family:var(--font-body);font-size:13px;cursor:pointer}
.toast{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(0.8);background:rgba(126,200,212,0.95);color:var(--bg-primary);padding:16px 32px;border-radius:var(--radius);font-size:15px;font-weight:700;opacity:0;pointer-events:none;transition:all .3s;z-index:300}
.toast.show{opacity:1;transform:translate(-50%,-50%) scale(1)}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
</style>
</head>
<body>

</div>

<button class="aspect-btn" data-aspect="square" onclick="setAspect('square')"><span class="aspect-icon square"></span>正方形</button>

</div>
<div class="template-section">

<div class="modal-overlay" id="presetModal"><div class="modal"><h3 id="modalTitle">プリセット追加</h3><label>キャラ名</label><input type="text" id="presetName" placeholder="例：雪間"><label>性別</label><select id="presetGender"><option value="male">男性</option><option value="female">女性</option></select><label>身長（cm）</label><input type="number" id="presetHeight" placeholder="185"><label>体重（kg）</label><input type="number" id="presetWeight" placeholder="85"><label>体型タイプ</label><select id="presetBodyType"><option value="ぽっちゃりとした体型">ぽっちゃりとした体型</option><option value="しっかりとした身体つき">しっかりとした身体つき</option><option value="筋肉質な体型">筋肉質な体型</option><option value="細身の体型">細身の体型</option><option value="スレンダーな体型">スレンダーな体型</option><option value="グラマラスな体型">グラマラスな体型</option></select><div class="modal-btns"><button class="btn-cancel" onclick="closeModal()">キャンセル</button><button class="btn-delete" id="deletePresetBtn" onclick="deletePreset()" style="display:none">削除</button><button class="btn-save" onclick="savePreset()">保存</button></div></div></div>
<div class="toast" id="toast"></div>

{id:'lighting',title:'ライティング',titleEn:'Lighting',dot:'gray',modes:['male','female','couple'],subcats:[{label:'',items:[{jp:'ゴールデンアワー',en:'golden hour'},{jp:'夕焼け',en:'sunset'},{jp:'ブルーアワー',en:'blue hour'},{jp:'月光',en:'moonlight'},{jp:'逆光',en:'backlit'},{jp:'ドラマチック照明',en:'dramatic lighting'},{jp:'柔らかい自然光',en:'soft natural light'},{jp:'ネオンの光',en:'neon glow'},{jp:'キャンドルの灯り',en:'candlelight'},{jp:'朝の光',en:'morning light'},{jp:'木漏れ日',en:'dappled sunlight through trees'},{jp:'夕暮れ',en:'twilight'},{jp:'深夜',en:'late night atmosphere'}]}]},
{id:'effects',title:'エフェクト',titleEn:'Effects',dot:'pink',modes:['male','female','couple'],subcats:[{label:'キラキラ',items:[{jp:'きらめき',en:'sparkles'},{jp:'グリッター',en:'glitter effect'},{jp:'光の粒子',en:'light particles'},{jp:'レンズフレア',en:'lens flare'},{jp:'ボケ',en:'bokeh'},{jp:'ダイヤモンドダスト',en:'diamond dust'}]},{label:'自然',items:[{jp:'桜の花びら',en:'cherry blossom petals falling'},{jp:'落ち葉',en:'falling autumn leaves'},{jp:'雪の結晶',en:'snowflakes'},{jp:'雨粒',en:'rain drops'},{jp:'舞う羽根',en:'floating feathers'},{jp:'紙吹雪',en:'confetti'}]},{label:'ドラマチック',items:[{jp:'風になびく',en:'wind blowing hair and clothes'},{jp:'ドラマチックな影',en:'dramatic shadows'},{jp:'背景ぼかし',en:'background blur'},{jp:'リムライト',en:'rim light'},{jp:'光芒',en:'god rays'}]},{label:'ファンタジー',items:[{jp:'魔法陣',en:'magic circles'},{jp:'光る蝶',en:'glowing butterflies'},{jp:'オーロラ',en:'aurora borealis'},{jp:'幻想的な輝き',en:'ethereal glow'},{jp:'光の翼',en:'wings of light'}]}]}
];

// Build en->jp lookup
const enToJp={};
C.forEach(cat=>cat.subcats.forEach(sc=>sc.items.forEach(item=>{enToJp[item.en]=item.jp})));

function renderCategories(){
const c=document.getElementById('categories');c.innerHTML='';
c.insertAdjacentHTML('beforeend','<div class="category" id="cat-bodytype"><div class="cat-header" onclick="toggleCat(\'bodytype\')"><h2><span class="cat-dot pink"></span>体型プリセット</h2><div class="cat-right"><span class="cat-count" id="count-bodytype"></span><span class="cat-arrow">▼</span></div></div><div class="cat-body" id="body-bodytype"><div class="preset-area" id="presetList"></div><button class="add-preset-btn" onclick="openAddPreset()">＋ 新しいプリセットを追加</button></div></div>');
C.forEach(cat=>{
const hasGuide=!!GUIDE[cat.id];
const helpBtn=hasGuide?'<button class="cat-help-btn" onclick="event.stopPropagation();toggleInlineHelp(\''+cat.id+'\')" title="ガイド">?</button>':'';
let guideHtml='';
if(hasGuide){
guideHtml='<div class="inline-help" id="help-'+cat.id+'"><div class="inline-help-title">📖 タップでプロンプトに追加できます</div>';
GUIDE[cat.id].forEach(g=>{
guideHtml+='<div class="help-tag '+(selectedTags.has(g.en)?'selected':'')+'" data-en="'+g.en+'" onclick="toggleHelpTag(this)"><div class="ht-plus">'+(selectedTags.has(g.en)?'✓':'+')+'</div><div class="ht-info"><div class="ht-en">'+g.en+'</div><div class="ht-jp">'+g.jp+'</div><div class="ht-desc">'+g.desc+'</div></div></div>';
});
guideHtml+='</div>';
}
c.insertAdjacentHTML('beforeend','<div class="category '+(cat.modes.includes(currentMode)?'':'hidden')+'" id="cat-'+cat.id+'" data-modes="'+cat.modes.join(',')+'"><div class="cat-header" onclick="toggleCat(\''+cat.id+'\')"><h2><span class="cat-dot '+cat.dot+'"></span><span class="cat-title-text" data-jp="'+cat.title+'" data-en="'+cat.titleEn+'">'+(currentLang==='jp'?cat.title:cat.titleEn)+'</span></h2><div class="cat-right">'+helpBtn+'<span class="cat-count" id="count-'+cat.id+'"></span><span class="cat-arrow">▼</span></div></div><div class="cat-body" id="body-'+cat.id+'">'+guideHtml+cat.subcats.map(sc=>(sc.label?'<div class="subcat-label">'+sc.label+'</div>':'')+'<div class="tags">'+sc.items.map(item=>'<div class="tag '+(cat.dot==='pink'?'pink-sel':'')+' '+(selectedTags.has(item.en)?'selected '+(cat.dot==='pink'?'pink-tag':''):'')+'" data-en="'+item.en+'" data-jp="'+item.jp+'" onclick="toggleTag(this)">'+(currentLang==='jp'?item.jp:item.en)+'</div>').join('')+'</div>').join('')+'</div></div>');
});
renderPresets();updateCounts();
}

function renderPresets(){const l=document.getElementById('presetList');if(!l)return;const rp=presets.filter(p=>{if(currentMode==='male')return p.gender==='male';if(currentMode==='female')return p.gender==='female';return true});l.innerHTML=rp.length===0?'<div style="color:var(--text-muted);font-size:12px;padding:8px;text-align:center;">プリセットがありません</div>':rp.map(p=>'<div class="preset-card '+(selectedPresets[p.gender]===p.id?'selected':'')+'" onclick="selectPreset(\''+p.id+'\')"><div class="preset-info"><div class="preset-name">'+(p.gender==='male'?'♂':'♀')+' '+p.name+'</div><div class="preset-detail">'+p.height+'cm / '+(p.weight?p.weight+'kg / ':'')+p.bodyType+'</div></div><div class="preset-actions"><button onclick="event.stopPropagation();openEditPreset(\''+p.id+'\')">✏️</button></div></div>').join('')}

function setMode(m){currentMode=m;document.querySelectorAll('.mode-btn').forEach(b=>b.classList.toggle('active',b.dataset.mode===m));document.querySelectorAll('.category[data-modes]').forEach(c=>{c.classList.toggle('hidden',!c.dataset.modes.split(',').includes(m))});renderPresets();updatePrompt()}
function setAspect(a){currentAspect=a;document.querySelectorAll('.aspect-btn').forEach(b=>b.classList.toggle('active',b.dataset.aspect===a));updatePrompt()}
function toggleCat(id){document.querySelector('#cat-'+id+' .cat-header').classList.toggle('open');document.getElementById('body-'+id).classList.toggle('open')}
function toggleInlineHelp(id){const h=document.getElementById('help-'+id);if(h)h.classList.toggle('open');const btn=document.querySelector('#cat-'+id+' .cat-help-btn');if(btn)btn.classList.toggle('active')}
function toggleTag(el){el.classList.toggle('selected');if(el.classList.contains('pink-sel')&&el.classList.contains('selected'))el.classList.add('pink-tag');else el.classList.remove('pink-tag');if(el.classList.contains('selected'))selectedTags.add(el.dataset.en);else selectedTags.delete(el.dataset.en);syncHelpTags(el.dataset.en);updateCounts();updatePrompt()}
function toggleHelpTag(el){const en=el.dataset.en;if(selectedTags.has(en)){selectedTags.delete(en);el.classList.remove('selected');el.querySelector('.ht-plus').textContent='+'}else{selectedTags.add(en);el.classList.add('selected');el.querySelector('.ht-plus').textContent='✓'}syncMainTags(en);updateCounts();updatePrompt()}
function syncHelpTags(en){document.querySelectorAll('.help-tag[data-en="'+en+'"]').forEach(ht=>{if(selectedTags.has(en)){ht.classList.add('selected');ht.querySelector('.ht-plus').textContent='✓'}else{ht.classList.remove('selected');ht.querySelector('.ht-plus').textContent='+'}})}
function syncMainTags(en){document.querySelectorAll('.tag[data-en="'+en+'"]').forEach(t=>{if(selectedTags.has(en)){t.classList.add('selected');if(t.classList.contains('pink-sel'))t.classList.add('pink-tag')}else{t.classList.remove('selected','pink-tag')}})}
function toggleLang(){currentLang=currentLang==='jp'?'en':'jp';document.querySelectorAll('.cat-title-text').forEach(el=>{el.textContent=currentLang==='jp'?el.dataset.jp:el.dataset.en});document.querySelectorAll('.tag').forEach(el=>{el.textContent=currentLang==='jp'?el.dataset.jp:el.dataset.en})}
function togglePromptLang(){promptLang=promptLang==='en'?'jp':'en';const btn=document.getElementById('promptLangBtn');const label=document.getElementById('promptLabel');if(promptLang==='jp'){btn.textContent='英語で見る';btn.classList.add('active');label.textContent='プロンプト（日本語 - タップで削除）'}else{btn.textContent='日本語で見る';btn.classList.remove('active');label.textContent='プロンプト（タップで削除）'}updatePrompt()}

function openAddPreset(){editingPresetId=null;document.getElementById('modalTitle').textContent='プリセット追加';document.getElementById('presetName').value='';document.getElementById('presetGender').value=currentMode==='female'?'female':'male';document.getElementById('presetHeight').value='';document.getElementById('presetWeight').value='';document.getElementById('presetBodyType').value='しっかりとした身体つき';document.getElementById('deletePresetBtn').style.display='none';document.getElementById('presetModal').classList.add('show')}
function openEditPreset(id){const p=presets.find(x=>x.id===id);if(!p)return;editingPresetId=id;document.getElementById('modalTitle').textContent='プリセット編集';document.getElementById('presetName').value=p.name;document.getElementById('presetGender').value=p.gender;document.getElementById('presetHeight').value=p.height;document.getElementById('presetWeight').value=p.weight;document.getElementById('presetBodyType').value=p.bodyType;document.getElementById('deletePresetBtn').style.display='block';document.getElementById('presetModal').classList.add('show')}
function closeModal(){document.getElementById('presetModal').classList.remove('show')}
function savePreset(){const name=document.getElementById('presetName').value.trim();const gender=document.getElementById('presetGender').value;const height=document.getElementById('presetHeight').value;const weight=document.getElementById('presetWeight').value;const bodyType=document.getElementById('presetBodyType').value;if(!name||!height){showToast('名前と身長を入力してね');return}if(editingPresetId){const i=presets.findIndex(x=>x.id===editingPresetId);if(i>=0)presets[i]={...presets[i],name,gender,height,weight,bodyType}}else presets.push({id:'p'+Date.now(),name,gender,height,weight,bodyType});localStorage.setItem('otomePresets',JSON.stringify(presets));closeModal();renderPresets();updatePrompt();showToast('保存しました ✨')}
function deletePreset(){if(!editingPresetId)return;presets=presets.filter(x=>x.id!==editingPresetId);if(selectedPresets.male===editingPresetId)selectedPresets.male=null;if(selectedPresets.female===editingPresetId)selectedPresets.female=null;localStorage.setItem('otomePresets',JSON.stringify(presets));closeModal();renderPresets();updatePrompt();showToast('削除しました')}
function selectPreset(id){const p=presets.find(x=>x.id===id);if(!p)return;selectedPresets[p.gender]=selectedPresets[p.gender]===id?null:id;renderPresets();updateCounts();updatePrompt()}

function updatePrompt(){
const box=document.getElementById('promptChips');
box.innerHTML='';
let enParts=[];
// Aspect chip
if(currentAspect!=='none'&&ASPECT_MAP[currentAspect]){
const aspJp={portrait:'縦長 2:3',landscape:'横長 3:2',square:'正方形 1:1'}[currentAspect]||'';
const label=promptLang==='jp'?aspJp:ASPECT_MAP[currentAspect];
box.innerHTML+='<span class="p-chip aspect-chip">'+label+'<span class="chip-x" onclick="removeAspect()">✕</span></span>';
enParts.push(ASPECT_MAP[currentAspect]);
}
// Tag chips
[...selectedTags].forEach(en=>{
const jp=enToJp[en]||en;
const label=promptLang==='jp'?jp:en;
box.innerHTML+='<span class="p-chip">'+label+'<span class="chip-x" onclick="removeTag(\''+en.replace(/'/g,"\\'")+'\')">✕</span></span>';
enParts.push(en);
});
// Body preset chips
if(currentMode==='male'||currentMode==='couple'){const mp=presets.find(x=>x.id===selectedPresets.male);if(mp){const s='男性、'+mp.height+'センチ、'+(mp.weight?mp.weight+'キロ、':'')+mp.bodyType;box.innerHTML+='<span class="p-chip body-chip">'+s+'<span class="chip-x" onclick="removeBodyPreset(\'male\')">✕</span></span>';enParts.push(s)}}
if(currentMode==='female'||currentMode==='couple'){const fp=presets.find(x=>x.id===selectedPresets.female);if(fp){const s='女性、'+fp.height+'センチ、'+(fp.weight?fp.weight+'キロ、':'')+fp.bodyType;box.innerHTML+='<span class="p-chip body-chip">'+s+'<span class="chip-x" onclick="removeBodyPreset(\'female\')">✕</span></span>';enParts.push(s)}}
// Free text chip
const ft=document.getElementById('freeText').value.trim();
if(ft){box.innerHTML+='<span class="p-chip free-chip">'+ft.substring(0,40)+(ft.length>40?'...':'')+'</span>';enParts.push(ft)}
box.dataset.enPrompt=enParts.join(', ');
}

function removeTag(en){selectedTags.delete(en);syncMainTags(en);syncHelpTags(en);updateCounts();updatePrompt()}
function removeAspect(){currentAspect='none';document.querySelectorAll('.aspect-btn').forEach(b=>b.classList.toggle('active',b.dataset.aspect==='none'));updatePrompt()}
function removeBodyPreset(gender){selectedPresets[gender]=null;renderPresets();updateCounts();updatePrompt()}

function updateCounts(){C.forEach(cat=>{const el=document.getElementById('count-'+cat.id);if(!el)return;let c=0;cat.subcats.forEach(sc=>sc.items.forEach(item=>{if(selectedTags.has(item.en))c++}));el.textContent=c>0?c:''});const pe=document.getElementById('count-bodytype');if(pe){let c=0;if(selectedPresets.male)c++;if(selectedPresets.female)c++;pe.textContent=c>0?c:''}}

function copyPrompt(){const text=document.getElementById('promptChips').dataset.enPrompt||'';if(!text){showToast('プロンプトがないよ！');return}navigator.clipboard.writeText(text).then(()=>{const btn=document.getElementById('copyBtn');btn.classList.add('copied');btn.textContent='✅ コピー完了！';showToast('コピー完了！🎉');setTimeout(()=>{btn.classList.remove('copied');btn.textContent='📋 コピー'},2000)}).catch(()=>{const ta=document.createElement('textarea');ta.value=text;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);showToast('コピー完了！🎉')})}

function clearAll(){selectedTags.clear();selectedPresets={male:null,female:null};currentAspect='none';document.querySelectorAll('.aspect-btn').forEach(b=>b.classList.toggle('active',b.dataset.aspect==='none'));document.getElementById('freeText').value='';renderCategories();renderTemplates();updatePrompt();showToast('全消去しました')}

// Templates
function renderTemplates(){
const c=document.getElementById('templateTags');
c.innerHTML=TEMPLATES.map((t,i)=>'<div class="template-tag" data-idx="'+i+'" onclick="applyTemplate('+i+')">'+t.name+'</div>').join('');
}
function applyTemplate(idx){
const t=TEMPLATES[idx];if(!t)return;
t.tags.forEach(en=>{selectedTags.add(en);syncMainTags(en);syncHelpTags(en)});
updateCounts();updatePrompt();
showToast(t.name+' 適用！');
}

// Phrases
function renderPhrases(){
const c=document.getElementById('phraseTags');
c.innerHTML=PHRASES.map(p=>'<div class="phrase-tag" onclick="addPhrase(this)">'+p+'</div>').join('');
}
function addPhrase(el){
const ta=document.getElementById('freeText');
const v=ta.value;
ta.value=v+(v&&!v.endsWith(' ')&&!v.endsWith('\n')?'':'')+el.textContent;
updatePrompt();
showToast('追加しました');
}

function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),1500)}
renderCategories();renderTemplates();renderPhrases();updatePrompt();
</script>
</body>
</html>
